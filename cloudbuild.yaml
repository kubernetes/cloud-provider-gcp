# See https://cloud.google.com/cloud-build/docs/build-config
# For more information about Image pushing refer to https://github.com/kubernetes/test-infra/blob/master/config/jobs/image-pushing/README.md
timeout: 3600s
options:
  substitution_option: ALLOW_LOOSE
  machineType: E2_HIGHCPU_32
steps:
  - name: "gcr.io/cloud-builders/docker"
    env:
      - IMAGE_REPO=${_IMAGE_REPO}
      - IMAGE_TAG=${_PULL_BASE_REF}
      - CI=1
      - BUILDX_NO_DEFAULT_ATTESTATIONS=1
    entrypoint: tools/push-images
  # build auth-provider-gcp binary
  - name: "gcr.io/bazel-public/ubuntu2404" # https://github.com/bazelbuild/continuous-integration/issues/2020#issuecomment-2468024316
    args:
      - bazel
      - build
      - cmd/auth-provider-gcp:release
  - name: "gcr.io/cloud-builders/gsutil"
    args:
      - cp
      - -r
      - bazel-bin/cmd/auth-provider-gcp/output/
      - gs://k8s-staging-cloud-provider-gcp/auth-provider-gcp/${_GIT_TAG}
  # build gke-gcloud-auth-plugin binary
  - name: "gcr.io/bazel-public/ubuntu2404" # https://github.com/bazelbuild/continuous-integration/issues/2020#issuecomment-2468024316
    args:
      - bazel
      - build
      - cmd/gke-gcloud-auth-plugin:release
  - name: "gcr.io/cloud-builders/gsutil"
    args:
      - cp
      - -r
      - bazel-bin/cmd/gke-gcloud-auth-plugin/output/
      - gs://k8s-staging-cloud-provider-gcp/gke-gcloud-auth-plugin/${_GIT_TAG}
# TODO: figure out how to do this better, most probably getting rid of bazel
substitutions:
  _PULL_BASE_REF: "master"
  _GIT_TAG: "12345"
  _IMAGE_REPO: "gcr.io/k8s-staging-cloud-provider-gcp"
tags:
  - "cloud-provider-gcp"
  - ${_GIT_TAG}
